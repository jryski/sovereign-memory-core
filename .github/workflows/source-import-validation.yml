name: Source Import Validation

on:
  pull_request:
    paths:
      - "sql/01_core.sql"
      - "sql/04_source_import.sql"
      - "sql/validation/source_import_readiness.sql"
      - "scripts/validate_source_import.sh"
      - ".github/workflows/source-import-validation.yml"
  workflow_dispatch:

jobs:
  validate-source-import:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate source import/cutover layer
        run: bash scripts/validate_source_import.sh
